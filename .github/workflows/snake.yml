name: Generate Snake

# Genera la animación de la serpiente del contribution graph y la publica
# en la rama "output", de donde la lee el README.
# Corre cada día, en cada push a main, y se puede lanzar a mano.

on:
  schedule:
    - cron: "0 3 * * *"   # diario a las 03:00 UTC
  workflow_dispatch:        # botón "Run workflow" manual
  push:
    branches:
      - main

# Permiso necesario para escribir en la rama output
permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generar SVGs de la snake
        uses: Platane/snk@v3
        id: snake-gif
        with:
          github_user_name: ${{ github.repository_owner }}
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark&color_snake=%2322D3EE&color_dots=%23161B22,%230E4429,%23006D32,%2326A641,%2322D3EE

      - name: Publicar en la rama output
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
