<svg width="1200" height="280" viewBox="0 0 1200 280" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ===================================================================
       Banner de perfil — estilo Palantir / terminal de datos
       Monocromo severo · acento único: cian Triskel #22D3EE
       Identidad de marca: "J13" (intencional; el usuario real es J0013)
       =================================================================== -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M40 0 H0 V40" fill="none" stroke="#141414" stroke-width="1"/>
    </pattern>
  </defs>

  <!-- fondo negro casi absoluto + grid blueprint sutil -->
  <rect width="1200" height="280" fill="#0A0A0A"/>
  <rect width="1200" height="280" fill="url(#grid)" opacity="0.55"/>

  <!-- marco fino interior -->
  <rect x="24" y="24" width="1152" height="232" fill="none" stroke="#1E1E1E" stroke-width="1"/>

  <!-- ticks de esquina (grises, precisos) -->
  <g stroke="#3A3A3A" stroke-width="1.5" fill="none">
    <path d="M24 40 V24 H40"/>
    <path d="M1160 24 H1176 V40"/>
    <path d="M24 240 V256 H40"/>
    <path d="M1160 256 H1176 V240"/>
  </g>

  <!-- fila superior: status (con punto cian) + modo de sistema -->
  <circle cx="74" cy="60" r="4" fill="#22D3EE">
    <animate attributeName="opacity" values="1;0.25;1" dur="2.4s" repeatCount="indefinite"/>
  </circle>
  <text x="90" y="65" font-family="ui-monospace,'SF Mono','Roboto Mono',Menlo,Consolas,monospace"
        font-size="13" letter-spacing="2.5" fill="#8A8A8A">// STATUS: BUILDING</text>
  <text x="1126" y="65" text-anchor="end"
        font-family="ui-monospace,'SF Mono','Roboto Mono',Menlo,Consolas,monospace"
        font-size="13" letter-spacing="2.5" fill="#8A8A8A">SYS.MODE: LOCAL-FIRST</text>

  <!-- identidad: J13 -->
  <text x="70" y="176" font-family="'Helvetica Neue',Helvetica,Arial,sans-serif"
        font-size="120" font-weight="700" letter-spacing="1" fill="#ECECEC">J13</text>

  <!-- cursor de terminal: ÚNICO movimiento, acento cian -->
  <rect x="262" y="98" width="14" height="78" fill="#22D3EE">
    <animate attributeName="opacity" values="1;1;0;0" keyTimes="0;0.5;0.5;1" dur="1.1s" repeatCount="indefinite"/>
  </rect>

  <!-- línea fina de acento (cian) -->
  <line x1="72" y1="196" x2="252" y2="196" stroke="#22D3EE" stroke-width="2"/>

  <!-- subtítulo -->
  <text x="72" y="222" font-family="ui-monospace,'SF Mono','Roboto Mono',Menlo,Consolas,monospace"
        font-size="16" letter-spacing="0.5" fill="#7C7C7C">Builder de sistemas de IA y automatización</text>

  <!-- fila inferior: descriptor de sistema + versión -->
  <text x="72" y="246" font-family="ui-monospace,'SF Mono','Roboto Mono',Menlo,Consolas,monospace"
        font-size="12" letter-spacing="2" fill="#5E5E5E">SYS: AI · AUTOMATION · INTELLIGENCE</text>
  <text x="1126" y="246" text-anchor="end"
        font-family="ui-monospace,'SF Mono','Roboto Mono',Menlo,Consolas,monospace"
        font-size="12" letter-spacing="2" fill="#5E5E5E">v2026</text>
</svg>
